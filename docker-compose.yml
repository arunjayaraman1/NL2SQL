services:
  db:
    image: postgres:16-alpine
    container_name: nl2sql-db
    environment:
      POSTGRES_DB: ${DB_NAME:-hr_db}
      POSTGRES_USER: ${DB_USER:-newpage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init/02-hr_schema.sql:/docker-entrypoint-initdb.d/02-hr_schema.sql:ro
      - ./docker/db/init/amazon_marketplace.sql:/docker-entrypoint-initdb.d/amazon_marketplace.sql:ro
      - ./docker/db/init/03-query_logs.sql:/docker-entrypoint-initdb.d/03-query_logs.sql:ro
      - ./docker/db/init/00-init-pharma.sh:/docker-entrypoint-initdb.d/00-init-pharma.sh:ro
      - ./docker/db/init/pharma_schema.sql:/docker-entrypoint-initdb.d/pharma_schema.sql:ro
      - ./docker/db/init/pharma_data.sql:/docker-entrypoint-initdb.d/pharma_data.sql:ro
      - ./docker/db/init/pharma_data_simple.sql:/docker-entrypoint-initdb.d/pharma_data_simple.sql:ro
      - ./docker/db/init/medical_schema.sql:/docker-entrypoint-initdb.d/medical_schema.sql:ro
      - ./docker/db/init/medical_data.sql:/docker-entrypoint-initdb.d/medical_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-newpage} -d ${DB_NAME:-hr_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nl2sql-backend
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DATABASES_CONFIG: /app/databases.json
      CORS_ALLOW_ORIGINS: http://localhost:3001,http://localhost:3000
    volumes:
      - ./databases.json:/app/databases.json:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nl2sql-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  pgdata:
